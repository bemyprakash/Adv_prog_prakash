{% extends "layout.html" %}

{% block title %}Foodizz - Register{% endblock %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 4rem auto;">
  <h2 class="card-title" style="text-align: center; margin-bottom: 1.5rem;">Create an Account</h2>
  {% if error %}
  <div style="color: var(--danger); background: #ffebe6; padding: 0.8rem; border-radius: 4px; margin-bottom: 1.5rem; text-align: center; border: 1px solid #ffbdad;">
      <b>{{ error }}</b>
  </div>
  {% endif %}
  <form method="post" action="/web/register">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" class="form-control" required placeholder="John Doe">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" name="phone" class="form-control" required placeholder="1234567890">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" class="form-control" required placeholder="user@example.com">
    </div>
    <div class="form-group">
      <label>Account Password</label>
      <input type="password" name="password" class="form-control" required placeholder="Password">
    </div>
    <div class="form-group">
      <label>Select Your Role</label>
      <select name="role" class="form-control" style="background:#f4f5f7">
        <option value="customer">Customer (Order Food)</option>
        <option value="restaurant_owner">Restaurant Owner (Fulfill Orders)</option>
        <option value="delivery_agent">Delivery Agent (Transport)</option>
        <option value="customer_support">Support Agent (Handle Tickets)</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.8rem; font-size: 1.05rem">Register Account</button>
  </form>
  
  <div style="margin-top: 1.5rem; text-align: center;">
      <a href="/web/login" style="color: var(--primary-blue); text-decoration: none; font-weight: 500;">Back to Login</a>
  </div>
</div>
{% endblock %}
